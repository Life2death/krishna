# relic configuration for Azure Key Vault code-signing.
# Edit these values with your Key Vault and certificate names (see CODE_SIGNING_PLAN.md).
# This file contains no secrets — auth is via environment variables (AZURE_CLIENT_ID, etc.).
tokens:
  azure:
    type: azure
keys:
  azure:
    token: azure
    id: https://krishna-codesign.vault.azure.net/certificates/krishna-signing
