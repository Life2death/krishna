name: Build & Release

# Runs ONLY when a version tag is pushed (e.g. `git push origin v1.0.1`).
# The entire build + packaging + publishing happens here on GitHub's
# windows-latest runner — nothing is ever built locally.
on:
  push:
    tags: ["v*"]

# Required so tauri-action can create the GitHub Release and upload installers.
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Frontend tests
        run: npm test

      - name: Rust tests
        run: cargo test
        working-directory: src-tauri

      - name: Build & publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Krishna ${{ github.ref_name }}"
          releaseBody: "Download the installer from the assets below."
          releaseDraft: true
          prerelease: false
